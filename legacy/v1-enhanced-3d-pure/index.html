<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avinash Zala — Space Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Main 3D WebGL Canvas (Space3D engine renders 60+ real-time effects: parallax stars, volumetric nebulae, 5 distinct planets w/ atmospheres+particles, wormhole, station, asteroids, flyers, post fx) -->
    <canvas id="space"></canvas>

    <!-- Chromatic aberration overlay (subtle screen-space effect) -->
    <div id="chromaOverlay"></div>

    <!-- Vignette overlay for cinematic feel -->
    <div id="vignette"></div>

    <!-- BOOT SEQUENCE -->
    <div id="boot" class="screen active">
        <div class="boot-content">
            <div class="boot-logo"><i class="fas fa-satellite"></i></div>
            <div class="boot-lines" id="bootLines"></div>
        </div>
    </div>

    <!-- LOADING -->
    <div id="loading" class="screen">
        <div class="load-overlay"></div>
        <div class="load-content">
            <h1 class="glitch" data-text="WARP DRIVE">WARP DRIVE</h1>
            <div class="load-bar"><div class="load-fill"></div></div>
            <p class="load-sub" id="loadStatus">Initializing quantum navigation...</p>
        </div>
    </div>

    <!-- MAIN COCKPIT -->
    <div id="cockpit" class="screen">
        <div class="hud-top">
            <div class="hud-item"><span class="hud-label">PILOT</span><span class="hud-value">AVINASH ZALA</span></div>
            <div class="hud-item"><span class="hud-label">SECTOR</span><span class="hud-value" id="sectorName">LAUNCH</span></div>
            <div class="hud-item"><span class="hud-label">STATUS</span><span class="hud-value blink">● ONLINE</span></div>
        </div>
        <div class="cockpit-frame">
            <div class="frame-top"></div><div class="frame-bottom"></div>
            <div class="frame-left"></div><div class="frame-right"></div>
            <div class="frame-corner tl"></div><div class="frame-corner tr"></div>
            <div class="frame-corner bl"></div><div class="frame-corner br"></div>
            <div class="hex-grid"></div>
        </div>
        <div class="crosshair">
            <div class="ch-h"></div><div class="ch-v"></div>
            <div class="ch-dot"></div>
            <div class="ch-ring r1"></div><div class="ch-ring r2"></div>
        </div>
        <div class="scanline"></div>
        <div class="reticle"></div>
        <div class="planet-nav" id="planetNav"></div>

        <!-- WORMHOLE OVERLAY (3D wormhole renders behind this; CSS gradient adds extra punch) -->
        <div class="wh-video-overlay" id="whVideoOverlay">
            <div class="wh-bg"></div>
            <div class="wh-streaks" id="whStreaks"></div>
            <div class="wh-text" id="whText">WARPING</div>
        </div>

        <!-- SECTOR ARRIVAL FLASH (CSS-only flash) -->
        <div class="sector-arrival-video" id="sectorArrivalVideo">
            <div class="arrival-overlay"></div>
        </div>

        <!-- CONTENT PANEL -->
        <div class="content-panel" id="contentPanel">
            <div class="panel-close" id="panelClose"><i class="fas fa-times"></i></div>
            <div class="panel-content" id="panelContent"></div>
        </div>

        <!-- BOTTOM HUD -->
        <div class="hud-bottom">
            <div class="hud-radar"></div>
            <div class="hud-info">
                <div class="hud-stat"><span class="hud-stat-label">WARP</span>
                    <div class="speed-bar"><div class="speed-fill" id="speedFill"></div></div>
                    <span id="warpSpeed">0.5</span>c
                </div>
                <div class="hud-stat"><span class="hud-stat-label">SHIELDS</span>
                    <div class="speed-bar"><div class="speed-fill sh">100%</div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Three.js + Space3D Engine (real-time 3D, 60+ effects, replaces videos) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="assets/js/space3d.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
