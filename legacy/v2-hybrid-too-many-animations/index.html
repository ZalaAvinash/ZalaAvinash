<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avinash Zala — Space Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- 
      CINEMATIC VIDEO LAYERS (bottom z)
      These are the user's provided high-quality reference videos used heavily for 
      realistic backgrounds, loading, warp, and sector arrivals (per original spec).
      Three.js canvas renders interactive 3D elements (planets, station, particles) on top.
    -->
    <div id="video-layers">
        <!-- Main cinematic background (swapped by VideoManager for sector/ambient) -->
        <video id="cinematic-bg" class="cinematic-video" muted playsinline preload="metadata"></video>
        
        <!-- Dedicated full-bleed overlay videos for key cinematic moments -->
        <video id="rocket-video" class="cinematic-video cinematic-full" muted playsinline preload="auto"></video>
        <video id="wormhole-video" class="cinematic-video cinematic-full" muted playsinline preload="metadata"></video>
        <video id="arrival-video" class="cinematic-video cinematic-full" muted playsinline preload="metadata"></video>
    </div>

    <!-- Main 3D WebGL Canvas (interactive planets, station, asteroids, flyers, particles, overlays on video) -->
    <canvas id="space"></canvas>

    <!-- Cinematic post overlays (work on top of both video + 3D) -->
    <div id="chromaOverlay"></div>
    <div id="vignette"></div>

    <!-- BOOT SEQUENCE (pure UI, before any video/3D) -->
    <div id="boot" class="screen active">
        <div class="boot-content">
            <div class="boot-logo"><i class="fas fa-satellite"></i></div>
            <div class="boot-lines" id="bootLines"></div>
        </div>
    </div>

    <!-- LOADING (rocket video will play here) -->
    <div id="loading" class="screen">
        <div class="load-overlay"></div>
        <div class="load-content">
            <h1 class="glitch" data-text="WARP DRIVE">WARP DRIVE</h1>
            <div class="load-bar"><div class="load-fill"></div></div>
            <p class="load-sub" id="loadStatus">Initializing quantum navigation...</p>
        </div>
    </div>

    <!-- MAIN COCKPIT / INTERACTIVE VIEW -->
    <div id="cockpit" class="screen">
        <div class="hud-top">
            <div class="hud-item" style="flex-direction:row;align-items:center;gap:8px">
                <img src="assets/images/profile/Profile.jpg" alt="Avinash Zala" style="width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid rgba(74,158,255,.4)">
                <div style="display:flex;flex-direction:column">
                    <span class="hud-label">PILOT</span>
                    <span class="hud-value">AVINASH ZALA</span>
                </div>
            </div>
            <div class="hud-item">
                <span class="hud-label">SECTOR</span>
                <span class="hud-value" id="sectorName">LAUNCH</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">STATUS</span>
                <span class="hud-value blink">● ONLINE</span>
            </div>
            <!-- Cinematic / Performance Mode Toggle (per plan) -->
            <div class="hud-item mode-toggle" id="modeToggle" title="Toggle Cinematic (video heavy) / Performance (3D only) mode. Cinematic uses your large video files.">
                <span class="hud-label">MODE</span>
                <span class="hud-value" id="modeValue">CINEMATIC</span>
            </div>
        </div>

        <div class="cockpit-frame">
            <div class="frame-top"></div><div class="frame-bottom"></div>
            <div class="frame-left"></div><div class="frame-right"></div>
            <div class="frame-corner tl"></div><div class="frame-corner tr"></div>
            <div class="frame-corner bl"></div><div class="frame-corner br"></div>
            <div class="hex-grid"></div>
        </div>

        <div class="crosshair">
            <div class="ch-h"></div><div class="ch-v"></div>
            <div class="ch-dot"></div>
            <div class="ch-ring r1"></div><div class="ch-ring r2"></div>
        </div>

        <div class="scanline"></div>
        <div class="reticle"></div>

        <div class="planet-nav" id="planetNav"></div>

        <!-- Hybrid wormhole / transition overlays (video + 3D on top) -->
        <div class="wh-video-overlay" id="whVideoOverlay">
            <div class="wh-bg"></div>
            <div class="wh-streaks" id="whStreaks"></div>
            <div class="wh-text" id="whText">WARPING</div>
        </div>

        <!-- Sector arrival flash / video moment -->
        <div class="sector-arrival-video" id="sectorArrivalVideo">
            <div class="arrival-overlay"></div>
        </div>

        <!-- CONTENT PANEL (glassmorphism) -->
        <div class="content-panel" id="contentPanel">
            <div class="panel-close" id="panelClose"><i class="fas fa-times"></i></div>
            <div class="panel-content" id="panelContent"></div>
        </div>

        <!-- BOTTOM HUD -->
        <div class="hud-bottom">
            <div class="hud-radar"></div>
            <div class="hud-info">
                <div class="hud-stat">
                    <span class="hud-stat-label">WARP</span>
                    <div class="speed-bar"><div class="speed-fill" id="speedFill"></div></div>
                    <span id="warpSpeed">0.5</span>c
                </div>
                <div class="hud-stat">
                    <span class="hud-stat-label">SHIELDS</span>
                    <div class="speed-bar"><div class="speed-fill sh">100%</div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 
      SCRIPTS (order matters)
      - Three.js (external)
      - config (data)
      - video-manager (heavy use of user's videos)
      - three-engine (interactive 3D)
      - app (orchestrator + UI)
    -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/video-manager.js"></script>
    <script src="assets/js/three-engine.js"></script>
    <script src="assets/js/audio.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
